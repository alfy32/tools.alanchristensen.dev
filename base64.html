<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Free online Base64 encoder and decoder. Auto-detects encode or decode. No data leaves your browser.">
  <title>Base64 Encoder / Decoder — Alan Christensen</title>
  <link rel="stylesheet" href="style.css?v=3">
  <script src="nav.js?v=3"></script>
  <script src="tools-nav.js?v=3"></script>
  <style>
    .b64-wrap {
      max-width: 720px;
    }

    .b64-textarea {
      width: 100%;
      min-height: 160px;
      resize: vertical;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", ui-monospace, "Courier New", monospace;
      font-size: 0.85rem;
      line-height: 1.6;
      transition: border-color 0.15s;
    }

    .b64-textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .b64-result-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.4rem;
      margin-top: 1.25rem;
    }

    .b64-result-label-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .b64-section-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .b64-badge {
      display: inline-block;
      padding: 0.1rem 0.55rem;
      border-radius: 99px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .b64-badge-encode {
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      color: var(--accent);
    }

    .b64-badge-decode {
      background: color-mix(in srgb, #16a34a 12%, transparent);
      color: #16a34a;
    }

    [data-theme="dark"] .b64-badge-decode {
      color: #4ade80;
      background: color-mix(in srgb, #4ade80 12%, transparent);
    }

    .b64-output {
      width: 100%;
      min-height: 120px;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--nav-bg);
      color: var(--text);
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", ui-monospace, "Courier New", monospace;
      font-size: 0.85rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
      overflow: auto;
    }

    .b64-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div id="tools-shell">
    <main id="tools-main">
      <div class="b64-wrap">
        <div class="tool-header">
          <h1>Base64 Encoder / Decoder</h1>
          <p>Paste or type text — encodes plain text, decodes Base64 automatically. Nothing leaves your browser.</p>
        </div>

        <label class="b64-section-label" for="b64-input">Input</label>
        <textarea
          id="b64-input"
          class="b64-textarea"
          spellcheck="false"
          placeholder="Paste plain text to encode, or Base64 to decode…"
        ></textarea>

        <div id="b64-result-section" style="display:none">
          <div class="b64-result-label-row">
            <div class="b64-result-label-left">
              <span class="b64-section-label">Result</span>
              <span class="b64-badge" id="b64-badge"></span>
            </div>
            <button class="btn-secondary" id="b64-copy-btn">Copy</button>
          </div>
          <div class="b64-output" id="b64-output"></div>
          <div class="b64-actions">
            <button class="btn-secondary" id="b64-use-btn">Use as input ↓</button>
            <button class="btn-secondary" id="b64-clear-btn">Clear</button>
          </div>
        </div>

        <div class="tool-error" id="b64-error"></div>
      </div>
    </main>
  </div>

  <script>
    var inputEl   = document.getElementById('b64-input');
    var outputEl  = document.getElementById('b64-output');
    var badgeEl   = document.getElementById('b64-badge');
    var sectionEl = document.getElementById('b64-result-section');
    var errorEl   = document.getElementById('b64-error');
    var copyBtn   = document.getElementById('b64-copy-btn');
    var useBtn    = document.getElementById('b64-use-btn');
    var clearBtn  = document.getElementById('b64-clear-btn');

    function looksLikeBase64(str) {
      if (!str) return false;
      // Must only contain base64 alphabet (standard or URL-safe)
      if (!/^[A-Za-z0-9+/=\-_]+$/.test(str)) return false;
      // Normalize URL-safe to standard for atob
      var normalized = str.replace(/-/g, '+').replace(/_/g, '/');
      // Pad to multiple of 4
      var padded = normalized;
      var rem = padded.length % 4;
      if (rem === 1) return false; // always invalid
      if (rem === 2) padded += '==';
      if (rem === 3) padded += '=';
      try {
        atob(padded);
        return true;
      } catch (e) {
        return false;
      }
    }

    function decodeBase64(str) {
      var normalized = str.replace(/-/g, '+').replace(/_/g, '/');
      var rem = normalized.length % 4;
      if (rem === 2) normalized += '==';
      if (rem === 3) normalized += '=';
      return decodeURIComponent(
        atob(normalized).split('').map(function (c) {
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join('')
      );
    }

    function run() {
      errorEl.style.display = 'none';
      var raw = inputEl.value;
      if (!raw) {
        sectionEl.style.display = 'none';
        return;
      }

      var stripped = raw.replace(/\s+/g, '');

      if (looksLikeBase64(stripped)) {
        try {
          var decoded = decodeBase64(stripped);
          outputEl.textContent = decoded;
          badgeEl.textContent = 'Decoded';
          badgeEl.className = 'b64-badge b64-badge-decode';
          sectionEl.style.display = 'block';
          return;
        } catch (e) {
          // fall through to encode
        }
      }

      // Encode
      try {
        var encoded = btoa(
          encodeURIComponent(raw).replace(/%([0-9A-F]{2})/g, function (m, p1) {
            return String.fromCharCode(parseInt(p1, 16));
          })
        );
        outputEl.textContent = encoded;
        badgeEl.textContent = 'Encoded';
        badgeEl.className = 'b64-badge b64-badge-encode';
        sectionEl.style.display = 'block';
      } catch (e) {
        errorEl.textContent = 'Could not encode: ' + e.message;
        errorEl.style.display = 'block';
        sectionEl.style.display = 'none';
      }
    }

    inputEl.addEventListener('input', run);

    copyBtn.addEventListener('click', function () {
      var text = outputEl.textContent;
      if (!text) return;
      navigator.clipboard.writeText(text).then(function () {
        var orig = copyBtn.textContent;
        copyBtn.textContent = 'Copied!';
        setTimeout(function () { copyBtn.textContent = orig; }, 1500);
      });
    });

    useBtn.addEventListener('click', function () {
      var text = outputEl.textContent;
      if (!text) return;
      inputEl.value = text;
      run();
      inputEl.focus();
    });

    clearBtn.addEventListener('click', function () {
      inputEl.value = '';
      sectionEl.style.display = 'none';
      errorEl.style.display = 'none';
      inputEl.focus();
    });
  </script>
</body>
</html>
